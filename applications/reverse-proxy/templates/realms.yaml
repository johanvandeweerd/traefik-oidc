{{- range $realm := .Values.realms }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http-production
  name: reverse-proxy-{{ $realm.name }}
spec:
  gatewayClassName: traefik
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 8443
      hostname: {{ $realm.hostname }}
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - group: core
            kind: Secret
            name: tls-{{ $realm.hostname | replace "." "-" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: reverse-proxy-{{ $realm.name }}-traefik-oidc-auth
spec:
  plugin:
    traefik-oidc-auth:
      Secret: "{{ randAlphaNum 32 }}"
      Provider:
        Url: https://{{ $.Values.keycloakHostname }}/realms/{{ $realm.name }}
        ClientId: {{ $realm.name }}
        ClientSecret: "${CLIENT_SECRET_{{ $realm.name | upper }}}"
      Scopes: [ "openid", "profile", "email" ]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reverse-proxy-{{ $realm.name }}
spec:
  parentRefs:
    - name: reverse-proxy-{{ $realm.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: reverse-proxy-{{ $realm.name }}-traefik-oidc-auth
      backendRefs:
        - name: httpbin
          port: 80
{{- end }}
